name: build
on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      head_sha:     ${{ steps.gate.outputs.head_sha }}
      short_sha:    ${{ steps.gate.outputs.short_sha }}
      build_id:     ${{ steps.gate.outputs.build_id }}
      built_at:     ${{ steps.gate.outputs.built_at }}
    steps:
      - uses: actions/checkout@v4
      - id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD=$(git rev-parse HEAD)
          SHORT=$(git rev-parse --short HEAD)
          BUILD_ID="nightly-$(date -u +%Y%m%d)-${SHORT}"
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PREV=$(gh release view nightly --json body -q .body 2>/dev/null \
                  | sed -n 's/^sha=//p' | head -1 || true)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$PREV" = "$HEAD" ]; then
            echo "Skip: HEAD ($HEAD) already published as the latest nightly."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Build: $BUILD_ID (event=${{ github.event_name }}, prev=$PREV)"
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
          fi
          echo "head_sha=$HEAD"   >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "built_at=$BUILT_AT" >> "$GITHUB_OUTPUT"

  buildroot:
    name: Firmware
    needs: preflight
    if: needs.preflight.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      BUILD_ID:  ${{ needs.preflight.outputs.build_id }}
      BUILD_SHA: ${{ needs.preflight.outputs.head_sha }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          # Sigmastar [I6]
          - ssc325_lite
          - ssc325de_lite

          # Sigmastar [I6B]
          - ssc333_lite
          - ssc335_lite
          - ssc335de_lite
          - ssc337_lite
          - ssc337de_lite

          # Sigmastar [I6C]
          - ssc377_lite
          - ssc377d_lite
          - ssc377de_lite
          - ssc377qe_lite
          - ssc378de_lite
          - ssc378qe_lite

          # Sigmastar [I6E]
          - ssc30kd_lite
          - ssc30kq_lite
          - ssc338q_lite

          # Ingenic [T21]
          - t10_lite
          - t20_lite
          - t21_lite
          - t30_lite

          # Ingenic [T23]
          - t23_lite

          # Ingenic [T31]
          - t31_lite

          # Ingenic [T40]
          - t40_lite

          # Hisilicon [HI3516AV100]
          - hi3516av100_lite
          - hi3516av100_neo
          - hi3516dv100_lite

          # Hisilicon [HI3516CV100]
          - hi3516cv100_lite
          - hi3516cv100_neo
          - hi3518cv100_lite
          - hi3518ev100_lite

          # Hisilicon [HI3516CV200]
          - hi3516cv200_lite
          - hi3516cv200_neo
          - hi3518ev200_lite

          # Hisilicon [HI3516CV300]
          - hi3516cv300_lite
          - hi3516cv300_neo
          - hi3516ev100_lite

          # Hisilicon [HI3516CV500]
          - hi3516av300_lite
          - hi3516av300_neo
          - hi3516cv500_lite
          - hi3516dv300_lite

          # Hisilicon [HI3516CV6XX]
          - hi3516cv6xx_ultimate

          # Hisilicon [HI3516EV200]
          - hi3516dv200_lite
          - hi3516ev200_lite
          - hi3516ev300_lite
          - hi3518ev300_lite
          - hi3516ev300_neo

          # Hisilicon [HI3519V101]
          - hi3516av200_lite
          - hi3516av200_neo
          - hi3519v101_lite

          # Hisilicon [HI3520DV200]
          - hi3520dv200_lite

          # Hisilicon [HI3536CV100]
          - hi3536cv100_lite

          # Hisilicon [HI3536DV100]
          - hi3536dv100_lite

          # Goke [GK710X]
          - gk7102_lite
          - gk7102s_lite

          # Goke [GK7205V200]
          - gk7202v300_lite
          - gk7205v200_lite
          - gk7205v210_lite
          - gk7205v300_lite
          - gk7605v100_lite

          # Goke [GK7205V500]
          - gk7205v500_lite

          # Allwinner
          - v851s_lite

          # Fullhan
          - fh8852v100_lite
          - fh8852v200_lite

          # Grainmedia
          - gm8135_lite
          - gm8136_lite

          # Novatek
          - nt98562_lite
          - nt98566_lite

          # Rockchip
          - rv1103_lite
          - rv1106_lite
          - rv1109_lite
          - rv1126_lite

          # Xiongmai
          - xm510_lite
          - xm530_lite
          - xm550_lite

          # Ultimate
          - ssc333_ultimate
          - ssc335_ultimate
          - ssc335de_ultimate
          - ssc337_ultimate
          - ssc337de_ultimate
          - ssc30kd_ultimate
          - ssc30kq_ultimate
          - ssc338q_ultimate
          - t20_ultimate
          - t21_ultimate
          - t31_ultimate
          - t40_ultimate
          - hi3516av100_ultimate
          - hi3516dv100_ultimate
          - hi3518ev200_ultimate
          - hi3516cv300_ultimate
          - hi3516ev200_ultimate
          - hi3516ev300_ultimate
          - hi3518ev300_ultimate
          - hi3516av200_ultimate
          - gk7202v300_ultimate
          - gk7205v200_ultimate
          - gk7205v300_ultimate

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare firmware
        run: |
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          echo CACHE_DATE=$(date +%m) >> ${GITHUB_ENV}

      - name: Setup ccache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ${{matrix.platform}}-${{env.CACHE_DATE}}

      - name: Restore ccache
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: /tmp/ccache
          key: ${{matrix.platform}}-${{env.CACHE_DATE}}

      - name: Setup dl cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: output/dl
          key: dl-${{env.CACHE_DATE}}
          restore-keys: dl-

      - name: Restore dl cache
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: output/dl
          key: dl-${{env.CACHE_DATE}}
          restore-keys: dl-

      - name: Build firmware
        run: |
          export GIT_HASH=$(git rev-parse --short ${GITHUB_SHA})
          export GIT_BRANCH=${GITHUB_REF_NAME}
          echo GIT_HASH=${GIT_HASH} >> ${GITHUB_ENV}
          echo GIT_BRANCH=${GIT_BRANCH} >> ${GITHUB_ENV}

          mkdir -p /tmp/ccache
          ln -s /tmp/ccache ${HOME}/.ccache

          # Backoffs give 7 attempts total. The longer tail (600, 1200) covers
          # the GitHub releases CDN / toolchain mirror flakes that took down
          # hi3516av100_ultimate on 2026-05-20 (run 26196546684) — 502s
          # storming for >10 min outlasted the previous 30/60/120/300 budget.
          backoffs="30 60 120 300 600 1200"
          attempt=1
          for sleep_for in $backoffs ""; do
            make BOARD=${{matrix.platform}} && break
            if [ -z "$sleep_for" ]; then
              echo "::error::build failed after ${attempt} attempts"
              exit 1
            fi
            echo "::warning::attempt ${attempt} failed, retrying after ${sleep_for}s"
            sleep "$sleep_for"
            attempt=$((attempt + 1))
          done

          TIME=$(date -d @${SECONDS} +%M:%S)
          echo TIME=${TIME} >> ${GITHUB_ENV}

          NORFW=$(find output/images -name openipc*nor*)
          if [ -e ${NORFW} ]; then
            echo NORFW=${NORFW} >> ${GITHUB_ENV}
          fi

          NANDFW=$(find output/images -name openipc*nand*)
          if [ -e ${NANDFW} ]; then
            echo NANDFW=${NANDFW} >> ${GITHUB_ENV}
          fi

      - name: Verify kernel modules
        run: sh .github/scripts/check_target_modules.sh

      - name: Build size report
        run: |
          make BOARD=${{matrix.platform}} size-report || \
            echo "::warning::size-report failed for ${{matrix.platform}}"
          SIZES=$(find output/images -name 'sizes.*.json' | head -1)
          if [ -e "$SIZES" ]; then
            echo "SIZES=$SIZES" >> ${GITHUB_ENV}
          fi

      - name: Build kconfig graph
        run: |
          python3 -m pip install --user --break-system-packages kconfiglib || \
            { echo "::warning::kconfiglib install failed for ${{matrix.platform}}"; exit 0; }
          make BOARD=${{matrix.platform}} kconfig-graph || \
            { echo "::warning::kconfig-graph failed for ${{matrix.platform}}"; exit 0; }
          KCONFIG=$(find output/images -name 'kconfig-graph.*.json' | head -1)
          KHELP=$(find output/images -name 'kconfig-help.*.json' | head -1)
          if [ -e "$KCONFIG" ]; then echo "KCONFIG=$KCONFIG" >> ${GITHUB_ENV}; fi
          if [ -e "$KHELP" ]; then echo "KHELP=$KHELP" >> ${GITHUB_ENV}; fi

      - name: Upload firmware (dated)
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.build_id }}
          prerelease: true
          body: |
            sha=${{ needs.preflight.outputs.head_sha }}
            short=${{ needs.preflight.outputs.short_sha }}
            built_at=${{ needs.preflight.outputs.built_at }}
          files: |
            ${{env.NORFW}}
            ${{env.NANDFW}}
            ${{env.SIZES}}
            ${{env.KCONFIG}}
            ${{env.KHELP}}

      - name: Upload firmware (rolling nightly)
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          body: |
            sha=${{ needs.preflight.outputs.head_sha }}
            short=${{ needs.preflight.outputs.short_sha }}
            built_at=${{ needs.preflight.outputs.built_at }}
          files: |
            ${{env.NORFW}}
            ${{env.NANDFW}}
            ${{env.SIZES}}
            ${{env.KCONFIG}}
            ${{env.KHELP}}

      - name: Upload firmware (latest — legacy alias)
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            ${{env.NORFW}}
            ${{env.NANDFW}}
            ${{env.SIZES}}
            ${{env.KCONFIG}}
            ${{env.KHELP}}

      - name: Send binary
        if: github.event_name != 'pull_request' && env.NORFW
        run: |
          TG_MSG="Build: ${BUILD_ID}\nCommit: ${GIT_HASH}\nBranch: ${GIT_BRANCH}\nTime: ${TIME}\n\n"
          TG_ICON="\xE2\x9C\x85 GitHub Actions"
          TG_HEADER=$(echo -e ${TG_MSG}${TG_ICON})
          TG_TOKEN=${{secrets.TELEGRAM_TOKEN_BOT_OPENIPC}}
          TG_CHANNEL=${{secrets.TELEGRAM_CHANNEL_OPENIPC_DEV}}
          HTTP=$(curl -s -o /dev/null -w %{http_code} https://api.telegram.org/bot${TG_TOKEN}/sendDocument -F chat_id=${TG_CHANNEL} -F caption="${TG_HEADER}" -F document=@${NORFW})
          echo Telegram response: ${HTTP}
