# ptp4l configuration for OpenIPC precision-time profile.
#
# Disciplines CLOCK_REALTIME directly via software timestamping. No PHC
# is required (HiSilicon FE-MACs do not expose one), and no phc2sys
# helper is needed: ptp4l with time_stamping=software acts on the system
# clock when no PHC is bound.
#
# To use:
#   - bring up a PTP grandmaster on the LAN (e.g. `ptp4l -i eth0 -m`
#     on a Linux host), one camera per LAN.
#   - keep this config as the camera-side client (clientOnly=1 below).
#   - launch via /etc/init.d/S60precision-time start.
#
# Expected precision on a quiet switched LAN: ~100 us - 1 ms.

[global]
domainNumber            24
time_stamping           software
clock_servo             pi
clientOnly              1
network_transport       UDPv4
delay_mechanism         E2E
priority1               248
priority2               248
free_running            0
freq_est_interval       1
logging_level           5
verbose                 0
step_threshold          1.0
first_step_threshold    0.00002
