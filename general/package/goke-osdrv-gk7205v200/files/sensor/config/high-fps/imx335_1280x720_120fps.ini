; IMX335 M7 flex-crop preset, 1280x720 @ 120 fps request.
; Apples-to-apples replacement for imx307_1280x720_60fps.ini:
; same resolution, ~2x the frame rate using M7 window-crop on IMX335.
; ~115 fps deliverable on UDP-RTP wire at 4 Mbps h.265 target.
; Requires majestic released after 13 May 2026 (Isp_SnsMode propagation).
; clock=37.125MHz overrides gk's vendor blob default of 27 MHz —
; without it the sensor INCK is wrong and the rate is ~73% of ev's.
; Full per-crop fps table + tuning guide:
;   openhisilicon/docs/imx335-v4-high-fps.md
[sensor]
Sensor_type=stSnsImx335Obj
Mode=WDR_MODE_NONE
DllFile=libsns_imx335.so

[mode]
input_mode=INPUT_MODE_MIPI
raw_bitness=10
clock=37.125MHz

[mipi]
lane_id = 0|1|2|3|-1|-1|-1|-1|

[isp_image]
Isp_FrameRate=120
Isp_Bayer=BAYER_RGGB
Isp_SnsMode=4
Isp_W=1280
Isp_H=720

[vi_dev]
Input_mod=VI_MODE_MIPI
DevRect_w=1280
DevRect_h=720
DevRect_x=0
DevRect_y=0
FullLinesStd=1500
