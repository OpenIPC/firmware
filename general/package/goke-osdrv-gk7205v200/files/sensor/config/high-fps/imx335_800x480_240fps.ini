; IMX335 M7 flex-crop preset, 800x480 @ 240 fps request.
; ~185 fps deliverable on UDP-RTP wire at 4 Mbps target, h.265.
; Requires majestic released after 13 May 2026 (Isp_SnsMode propagation).
; clock=37.125MHz overrides gk's vendor blob default of 27 MHz —
; without it the sensor INCK is wrong and the rate is ~73% of ev's.
; Full per-crop fps table + tuning guide:
;   openhisilicon/docs/imx335-v4-high-fps.md
[sensor]
Sensor_type=stSnsImx335Obj
Mode=WDR_MODE_NONE
DllFile=libsns_imx335.so

[mode]
input_mode=INPUT_MODE_MIPI
raw_bitness=10
clock=37.125MHz

[mipi]
lane_id = 0|1|2|3|-1|-1|-1|-1|

[isp_image]
Isp_FrameRate=240
Isp_Bayer=BAYER_RGGB
Isp_SnsMode=4
Isp_W=800
Isp_H=480

[vi_dev]
Input_mod=VI_MODE_MIPI
DevRect_w=800
DevRect_h=480
DevRect_x=0
DevRect_y=0
FullLinesStd=1100
