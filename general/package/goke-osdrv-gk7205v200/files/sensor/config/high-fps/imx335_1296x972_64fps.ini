; IMX335 binning mode, 1296x972 @ 64 fps — 2x2 on-chip pixel binning.
; Dispatched by DevRect_w=1296 DevRect_h=972 (no Isp_SnsMode required).
; Lower noise floor than M7 flex-crop at the same crop; useful for
; security streaming where light is variable.
; clock=37.125MHz overrides gk's vendor blob default of 27 MHz —
; without it the sensor INCK is wrong and the rate is ~73% of ev's.
; Full per-mode notes:
;   openhisilicon/docs/imx335-v4-high-fps.md
[sensor]
Sensor_type=stSnsImx335Obj
Mode=WDR_MODE_NONE
DllFile=libsns_imx335.so

[mode]
input_mode=INPUT_MODE_MIPI
raw_bitness=10
clock=37.125MHz

[mipi]
lane_id = 0|1|2|3|-1|-1|-1|-1|

[isp_image]
Isp_FrameRate=64
Isp_Bayer=BAYER_RGGB

[vi_dev]
Input_mod=VI_MODE_MIPI
DevRect_w=1296
DevRect_h=972
DevRect_x=0
DevRect_y=0
FullLinesStd=1500
