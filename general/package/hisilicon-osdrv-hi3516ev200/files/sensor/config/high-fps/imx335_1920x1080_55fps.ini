; IMX335 cropped 1080p mode, 1920x1080 @ 55 fps — 1.5x optical zoom
; (centre-crop of the all-pixel array). Dispatched by DevRect_w=1920
; DevRect_h=1080 (no Isp_SnsMode required).
; Common streaming preset; higher fps than the 4M/5M default modes.
; Full per-mode notes:
;   openhisilicon/docs/imx335-v4-high-fps.md
[sensor]
Sensor_type=stSnsImx335Obj
Mode=WDR_MODE_NONE
DllFile=libsns_imx335.so

[mode]
input_mode=INPUT_MODE_MIPI
raw_bitness=10

[mipi]
lane_id = 0|1|2|3|-1|-1|-1|-1|

[isp_image]
Isp_FrameRate=55
Isp_Bayer=BAYER_RGGB

[vi_dev]
Input_mod=VI_MODE_MIPI
DevRect_w=1920
DevRect_h=1080
DevRect_x=0
DevRect_y=0
FullLinesStd=2200
